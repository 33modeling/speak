<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f6f78" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#101419" media="(prefers-color-scheme: dark)" />
    <title>OPIc Mock Lab Offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        --app-bg: #f5f1e8;
        --surface: #fffdf8;
        --border: rgba(73, 86, 102, 0.16);
        --shadow: rgba(38, 45, 55, 0.08);
        --text: #1c2430;
        --text-muted: #53606f;
        background: var(--app-bg);
        color: var(--text);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --app-bg: #101419;
          --surface: #1f252c;
          --border: rgba(183, 198, 214, 0.16);
          --shadow: rgba(0, 0, 0, 0.34);
          --text: #e9eef4;
          --text-muted: #a3afba;
        }
      }

      body {
        display: grid;
        min-height: 100vh;
        place-items: center;
        margin: 0;
        padding: 24px;
      }

      main {
        width: min(480px, 100%);
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        padding: 28px;
        box-shadow: 0 18px 48px var(--shadow);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.6rem;
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: var(--text-muted);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>오프라인 상태입니다</h1>
      <p>이미 열었던 화면은 다시 접속되면 이어서 사용할 수 있습니다. TTS와 녹음은 브라우저와 네트워크 상태에 따라 제한될 수 있습니다.</p>
    </main>
  </body>
</html>
