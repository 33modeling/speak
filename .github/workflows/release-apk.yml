name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: Android versionName, without the leading v.
        required: true
        default: '0.0.0'
      version_code:
        description: Optional Android versionCode override.
        required: false
        default: ''
      create_release:
        description: Create or update the GitHub Release.
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: release-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: speak
  GRADLE_DIR: android
  VERSION_CODE_BASE: '1'
  ANDROID_COMPILE_SDK: '35'
  ANDROID_BUILD_TOOLS: '35.0.0'
  ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 || secrets.KEYSTORE_BASE64 }}
  ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || secrets.KEYSTORE_PASSWORD }}
  ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || secrets.KEY_ALIAS }}
  ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || secrets.KEY_PASSWORD }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_VERSION="${{ inputs.version_name }}"
            VERSION_CODE_INPUT="${{ inputs.version_code }}"
          else
            RAW_VERSION="${GITHUB_REF_NAME}"
            VERSION_CODE_INPUT=""
          fi
          VERSION_NAME="${RAW_VERSION#v}"
          if ! [[ "$VERSION_NAME" =~ ^[0-9]+(\.[0-9]+){0,2}$ ]]; then
            echo "Use a numeric version like 0.0.0 or a tag like v0.0.0." >&2
            exit 1
          fi
          IFS=. read -r MAJOR MINOR PATCH <<< "$VERSION_NAME"
          MINOR="${MINOR:-0}"
          PATCH="${PATCH:-0}"
          if [ -n "$VERSION_CODE_INPUT" ]; then
            if ! [[ "$VERSION_CODE_INPUT" =~ ^[0-9]+$ ]]; then
              echo "version_code must be a positive integer." >&2
              exit 1
            fi
            VERSION_CODE="$VERSION_CODE_INPUT"
          else
            VERSION_CODE=$((10#$VERSION_CODE_BASE + 10#$MAJOR * 1000000 + 10#$MINOR * 1000 + 10#$PATCH))
          fi
          if [ "$VERSION_CODE" -lt 1 ]; then
            echo "version_code must be at least 1." >&2
            exit 1
          fi
          TAG_NAME="v${VERSION_NAME}"
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platform-tools" "platforms;android-${ANDROID_COMPILE_SDK}" "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Install web dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Prepare release signing
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${ANDROID_KEYSTORE_BASE64}" ] && [ -n "${ANDROID_KEYSTORE_PASSWORD}" ] && [ -n "${ANDROID_KEY_ALIAS}" ] && [ -n "${ANDROID_KEY_PASSWORD}" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "${GRADLE_DIR}/release-keystore.jks"
            {
              echo "storeFile=release-keystore.jks"
              echo "storePassword=${ANDROID_KEYSTORE_PASSWORD}"
              echo "keyAlias=${ANDROID_KEY_ALIAS}"
              echo "keyPassword=${ANDROID_KEY_PASSWORD}"
            } > "${GRADLE_DIR}/keystore.properties"
            echo "HAS_RELEASE_SIGNING=true" >> "$GITHUB_ENV"
          else
            echo "HAS_RELEASE_SIGNING=false" >> "$GITHUB_ENV"
          fi

      - name: Make Gradle wrapper executable
        run: chmod +x "${GRADLE_DIR}/gradlew"

      - name: Build debug APK
        working-directory: ${{ env.GRADLE_DIR }}
        run: ./gradlew assembleDebug -PVERSION_NAME="${VERSION_NAME}" -PVERSION_CODE="${VERSION_CODE}" --no-daemon --stacktrace

      - name: Build signed release APK
        working-directory: ${{ env.GRADLE_DIR }}
        shell: bash
        run: |
          if [ "${HAS_RELEASE_SIGNING}" = "true" ]; then
            ./gradlew assembleRelease -PVERSION_NAME="${VERSION_NAME}" -PVERSION_CODE="${VERSION_CODE}" --no-daemon --stacktrace
          else
            echo "Release signing secrets are not configured; using the debug APK fallback."
          fi

      - name: Stage APK asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          SIGNED_APK="${GRADLE_DIR}/app/build/outputs/apk/release/app-release.apk"
          DEBUG_APK="${GRADLE_DIR}/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$SIGNED_APK" ]; then
            cp "$SIGNED_APK" "release-assets/${APP_NAME}-${TAG_NAME}.apk"
            echo "APK_KIND=signed release" >> "$GITHUB_ENV"
          else
            cp "$DEBUG_APK" "release-assets/${APP_NAME}-${TAG_NAME}-debug.apk"
            echo "APK_KIND=debug fallback" >> "$GITHUB_ENV"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ steps.version.outputs.tag_name }}-apk
          path: release-assets/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.create_release) }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: speak ${{ steps.version.outputs.tag_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            Android APK for speak ${{ steps.version.outputs.tag_name }}.

            Asset type: ${{ env.APK_KIND }}.
            Configure `ANDROID_KEYSTORE_BASE64`, `ANDROID_KEYSTORE_PASSWORD`, `ANDROID_KEY_ALIAS`, and `ANDROID_KEY_PASSWORD` repository secrets to publish a signed release APK.
          files: release-assets/*.apk
